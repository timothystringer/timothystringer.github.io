<!DOCTYPE html>
<html>
<head>
	<title>Timothy Stringer</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: Helvetica, Arial, 'Open Sans', sans-serif;
			font-size: 1em;
			line-height: 1.5;
		}

		h1 {
			font-size: clamp(24px, 5vw, 48px);
    		margin-bottom: 0.75em;
		}

		li {
			font-size: clamp(16px, 2.5vw, 32px);
    		line-height: 1.65;
		}

		.content {
			display: flex;
			align-items: center;
			justify-content: center;
			height: 100vh;
			flex-direction: column;
		}
	</style>
</head>
<body>
<main class="content">
	<h1>Timothy Stringer</h1>
	<ul>
		<li>Laravel Developer</li>
		<li>Photographer</li>
		<li>Hiker</li>
		<li>Rugby Player</li>
		<li>World Traveller</li>
	</ul>
</main>
</body>
</html>
